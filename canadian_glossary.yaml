# Canadian French (Québécois) Glossary
# English → French-Canadian substitutions for CAPS and related organizations
# Source: CAPS French Language Guidelines + OQLF standards
#
# Note: Use median dot (·) for inclusive forms — conférencier·ère not conférencier/ère
# OQLF standards cover general formatting, capitalization, and number/currency conventions.

# ── Acronyms ──────────────────────────────────────────────────────────────────
# Keep these in English exactly as-is (do not translate)

acronyms:
  CAPS: Canadian Association of Professional Speakers
  CSP: Certified Speaking Professional
  HoF: Hall of Fame
  GSF: Global Speakers Federation

# ── Always-substitute (deterministic, enforced post-translation) ───────────────
# {form_to_find: québécois_form}. The left side may be a standard-French term OR
# an English term that leaked through; it is rewritten to the québécois form by
# apply_glossary (word-boundary, case-preserving). Keep these UNAMBIGUOUS — they
# fire on every segment regardless of what the LLM produced. The LLM usually gets
# these right via the prompt; this is the deterministic safety net.

always:
  # courriel (masc, like "email") — safe one-to-one
  e-mail:                 courriel
  email:                  courriel
  courrier électronique:  courriel
  # fin de semaine is FEMININE but "week-end" is masculine — list article forms
  # FIRST (they run before the bare fallback) so gender agreement stays correct.
  le week-end:            la fin de semaine
  le weekend:             la fin de semaine
  un week-end:            une fin de semaine
  un weekend:             une fin de semaine
  ce week-end:            cette fin de semaine
  ce weekend:             cette fin de semaine
  du week-end:            de la fin de semaine
  au week-end:            à la fin de semaine
  des week-ends:          des fins de semaine
  week-ends:              fins de semaine
  weekends:               fins de semaine
  week-end:               fin de semaine
  weekend:                fin de semaine
  # same-gender, consonant-initial swaps (no article/elision hazard)
  parking:                stationnement
  shopping:               magasinage
  smartphone:             téléphone intelligent
  podcasts:               balados
  podcast:                balado
  spam:                   pourriel
  # vowel-initial targets: elide "la" → "l'" via article-aware forms first
  la newsletter:          l'infolettre
  une newsletter:         une infolettre
  newsletters:            infolettres
  newsletter:             infolettre
  la deadline:            l'échéance
  une deadline:           une échéance
  deadline:               échéance

